<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clara, Shari, and the Dragons</title>
<style>
  /* ---- The look of the game ---- */
  html, body {
    margin: 0;
    height: 100%;
    font-family: "Trebuchet MS", "Comic Sans MS", sans-serif;
    overflow: hidden;
    background: #0b1026;
    color: #fff;
    user-select: none;
  }

  /* The sky background — a soft gradient from night to dawn */
  #game {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: linear-gradient(180deg, #1a2a6c 0%, #6a3093 45%, #ff9966 100%);
    overflow: hidden;
  }

  /* The dragon you fly — built in layers so each effect has its own box.
     Outer box = where it is on screen. Middle box = which way it faces.
     Inner box = the flapping/landing wiggle and the PINK color. */
  #dragon {
    position: absolute;
    left: 120px;
    top: 50%;
    transition: top 0.25s ease, left 0.25s ease;
    filter: drop-shadow(0 6px 10px rgba(0,0,0,0.4));
    z-index: 5;
  }
  #dragonFlip {
    transform: scaleX(-1); /* flip it to face right */
  }
  #dragonBody {
    font-size: 64px;
    /* Turn the green dragon emoji PINK by spinning its colors around. */
    filter: hue-rotate(230deg) saturate(1.8) brightness(1.05);
    /* Flap up and down so it looks like it's flying. */
    animation: flap 0.5s ease-in-out infinite;
  }
  /* When the dragon lands, it stops flapping and settles down. */
  #dragonBody.landed {
    animation: none;
    transform: translateY(6px) rotate(0deg);
  }

  /* The flying flap: bob up, tilt a little, bob back down — forever. */
  @keyframes flap {
    0%, 100% { transform: translateY(0)     rotate(-4deg); }
    50%      { transform: translateY(-12px) rotate(4deg); }
  }

  /* A puff of fire the dragon breathes */
  .fire {
    position: absolute;
    font-size: 40px;
    z-index: 4;
    pointer-events: none;
  }

  /* Stars to collect */
  .star {
    position: absolute;
    font-size: 38px;
    z-index: 3;
  }

  /* Floating clouds for decoration */
  .cloud {
    position: absolute;
    font-size: 56px;
    opacity: 0.85;
    z-index: 2;
  }

  /* Potions to drink — worth 5 points each! */
  .potion {
    position: absolute;
    font-size: 38px;
    z-index: 3;
    animation: bobble 1.2s ease-in-out infinite;
  }
  @keyframes bobble {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }

  /* The BOOM when a potion explodes (or a boss is beaten). */
  .boom {
    position: absolute;
    font-size: 44px;
    z-index: 6;
    pointer-events: none;
    animation: boom 0.6s ease-out forwards;
  }
  @keyframes boom {
    0%   { transform: scale(0.4); opacity: 1; }
    100% { transform: scale(2.4); opacity: 0; }
  }

  /* Bosses — big, glowing, and worth lots of points. Fire at them! */
  .boss {
    position: absolute;
    font-size: 76px;
    z-index: 4;
    filter: drop-shadow(0 0 10px #ff3b3b);
    animation: bossPulse 0.8s ease-in-out infinite;
  }
  @keyframes bossPulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.14); }
  }

  /* Twinkling magical particles in the background (fairies, sparkles, bubbles).
     Each one floats upward and twinkles, then disappears. */
  .fairy {
    position: absolute;
    z-index: 1;
    pointer-events: none;
    font-size: 24px;
    animation: fairy 6s ease-in-out forwards;
  }
  @keyframes fairy {
    0%   { opacity: 0;   transform: translateY(0)      scale(0.6); }
    20%  { opacity: 1;   transform: translateY(-30px)  scale(1.2); }
    50%  { opacity: 0.4; transform: translateY(-80px)  scale(0.9); }
    80%  { opacity: 1;   transform: translateY(-130px) scale(1.2); }
    100% { opacity: 0;   transform: translateY(-180px) scale(0.6); }
  }

  /* A row of scenery along the bottom — trees, shells, mountains, etc. */
  #sceneryRow {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    text-align: center;
    font-size: 56px;
    word-spacing: 22px;
    white-space: nowrap;
    overflow: hidden;
    line-height: 1;
    padding-bottom: 4px;
    z-index: 1;
    pointer-events: none;
  }

  /* The "Welcome to a new land!" banner that sparkles up when you arrive. */
  #landBanner {
    position: absolute;
    left: 50%; top: 38%;
    transform: translate(-50%, -50%);
    z-index: 40;
    font-size: 34px;
    font-weight: bold;
    color: #fff;
    text-align: center;
    text-shadow: 0 0 18px #ffe66d, 0 2px 6px rgba(0,0,0,0.6);
    background: rgba(0,0,0,0.35);
    padding: 18px 30px;
    border-radius: 20px;
    opacity: 0;
    pointer-events: none;
  }
  #landBanner.show { animation: banner 2.8s ease-in-out; }
  @keyframes banner {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
    15%  { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
    80%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
  }

  /* The SPINNING STAR hazard — it whirls around and glows red for "danger!"
     Don't touch it or you'll get dizzy. */
  .spinStar {
    position: absolute;
    font-size: 42px;
    z-index: 3;
    filter: drop-shadow(0 0 9px #ff2d2d);
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* The dizzy stars that circle the dragon's head when it's stunned. */
  #dizzyStars {
    position: absolute;
    top: -4px;
    left: 50%;
    width: 0;
    height: 0;
    z-index: 10;
    animation: dizzySpin 0.8s linear infinite;
  }
  #dizzyStars span { position: absolute; font-size: 22px; }
  /* Place the three stars evenly around a circle (0°, 120°, 240°). */
  #dizzyStars span:nth-child(1) { transform: rotate(0deg)   translateX(28px); }
  #dizzyStars span:nth-child(2) { transform: rotate(120deg) translateX(28px); }
  #dizzyStars span:nth-child(3) { transform: rotate(240deg) translateX(28px); }
  @keyframes dizzySpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* While dizzy, the dragon wobbles instead of flapping. */
  #dragonBody.dizzy { animation: wobble 0.5s ease-in-out infinite; }
  @keyframes wobble {
    0%, 100% { transform: rotate(-12deg); }
    50%      { transform: rotate(12deg); }
  }

  /* ---- The scoreboard and title ---- */
  #hud {
    position: absolute;
    top: 16px;
    left: 16px;
    z-index: 20;
    background: rgba(0,0,0,0.35);
    padding: 12px 18px;
    border-radius: 16px;
    line-height: 1.5;
  }
  #hud h1 { margin: 0 0 6px; font-size: 20px; }
  #score { font-size: 22px; font-weight: bold; color: #ffe66d; }

  /* The microphone status badge */
  #mic {
    position: absolute;
    top: 16px;
    right: 16px;
    z-index: 20;
    background: rgba(0,0,0,0.35);
    padding: 12px 18px;
    border-radius: 16px;
    text-align: center;
    max-width: 260px;
  }
  #micDot {
    display: inline-block;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #888;
    margin-right: 6px;
    vertical-align: middle;
  }
  #micDot.listening { background: #4dff88; box-shadow: 0 0 12px #4dff88; }
  #heard { font-style: italic; color: #ffe66d; min-height: 1.2em; }

  /* The big start button */
  #startBtn {
    position: absolute;
    left: 50%; top: 60%;
    transform: translate(-50%, -50%);
    z-index: 30;
    font-size: 28px;
    padding: 18px 36px;
    border: none;
    border-radius: 20px;
    background: #ff4d6d;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 8px 0 #c9184a;
  }
  #startBtn:active { transform: translate(-50%, -50%) translateY(4px); box-shadow: 0 4px 0 #c9184a; }

  /* The list of voice commands */
  #help {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    background: rgba(0,0,0,0.35);
    padding: 10px 18px;
    border-radius: 16px;
    font-size: 15px;
    text-align: center;
  }
  #help b { color: #ffe66d; }
</style>
</head>
<body>
  <div id="game">
    <div id="sceneryRow"></div>
    <div id="landBanner"></div>
    <div id="hud">
      <h1>🐉 Clara, Shari, and the Dragons</h1>
      <div>Stars caught: <span id="score">0</span></div>
    </div>

    <div id="mic">
      <div><span id="micDot"></span><span id="micLabel">Mic off</span></div>
      <div id="heard">say a command…</div>
    </div>

    <div id="dragon"><div id="dragonFlip"><div id="dragonBody">🐉</div></div></div>

    <button id="startBtn">▶ Press to Play (talk to fly!)</button>

    <div id="help">
      Say: <b>up</b> · <b>down</b> · <b>left</b> · <b>right</b> · <b>fire</b> · <b>go</b> · <b>land</b><br>
      ⭐ star = 1 · 🧪 potion = 5 (it explodes!) · 🐲 boss = 20 (fire at it!)<br>
      ⚠️ Dodge the spinning 🌟 — it makes you dizzy!
    </div>
  </div>

<script>
/*
  Clara, Shari, and the Dragons
  ------------------------------
  A voice-controlled flying game.

  The big idea: the browser listens to your voice with the Web Speech API,
  turns what you say into text, and we look for command words inside that text.
  Each command word moves the dragon or makes it breathe fire.
*/

// Grab the things on the page we want to control.
const game       = document.getElementById("game");
const dragon     = document.getElementById("dragon");
const dragonBody = document.getElementById("dragonBody");
const bosses     = []; // all the bosses currently on screen
const scoreEl  = document.getElementById("score");
const startBtn = document.getElementById("startBtn");
const micDot   = document.getElementById("micDot");
const micLabel = document.getElementById("micLabel");
const heardEl    = document.getElementById("heard");
const sceneryRow = document.getElementById("sceneryRow");
const landBanner = document.getElementById("landBanner");

// ---- The five magical lands ----
// Each land is just a "recipe card": its sky, its sparkle, its scenery.
// The dragon flies to the next land every 200 points.
const LANDS = [
  {
    name: "🏰 the Sky Kingdom",
    background: "linear-gradient(180deg, #1a2a6c 0%, #6a3093 45%, #ff9966 100%)",
    fairy: "✨",
    glow: "#fff6b0",
    scenery: "☁️ ☁️ ☁️ ☁️ ☁️",
  },
  {
    name: "🧚 the Midsummer Forest",
    background: "linear-gradient(180deg, #07261c 0%, #0f5236 38%, #2f9d63 78%, #d4f3d0 100%)",
    fairy: "🧚",
    glow: "#b6ff9e",
    scenery: "🌲 🌳 🍄 🌸 🌳 🦋 🌲 🍄 🌳",
  },
  {
    name: "🧜 the Mermaid Lagoon",
    background: "linear-gradient(180deg, #00224e 0%, #0a4f8a 45%, #2bb3c0 85%, #aef3f0 100%)",
    fairy: "🫧",
    glow: "#9af0ff",
    scenery: "🐚 🪸 🐠 🌊 🪸 🐡 🐚 🌊 🪸",
  },
  {
    name: "❄️ the Aurora Peaks",
    background: "linear-gradient(180deg, #0d0033 0%, #2b0a6b 35%, #1f7a6b 70%, #d9f7ff 100%)",
    fairy: "🌟",
    glow: "#aeffe9",
    scenery: "🏔️ ⛰️ 🗻 ⛰️ 🏔️ 🗻 ⛰️",
  },
  {
    name: "🌈 the Rainbow Castle",
    background: "linear-gradient(180deg, #ff7eb3 0%, #b16cea 40%, #6a5cff 75%, #ffe6f7 100%)",
    fairy: "🌈",
    glow: "#fff0fb",
    scenery: "🏰 ☁️ 🌈 ☁️ 🏰 🌈 ☁️",
  },
];

let currentLand = 0;

// Add points, update the scoreboard, and check if it's time for a new land.
function addScore(points) {
  score += points;
  scoreEl.textContent = score;
  const idx = Math.min(LANDS.length - 1, Math.floor(score / 200));
  if (idx !== currentLand) switchLand(idx);
}

// Fly to a new land: change the sky, the scenery, and announce it.
function switchLand(idx) {
  currentLand = idx;
  const land = LANDS[idx];
  soundLand();
  game.style.background = land.background;
  sceneryRow.textContent = land.scenery;
  landBanner.textContent = "✨ Welcome to " + land.name + "! ✨";
  landBanner.classList.remove("show");
  void landBanner.offsetWidth; // a little trick that restarts the animation
  landBanner.classList.add("show");
}

// Make one twinkling magical sparkle for whichever land we're in.
function spawnFairy() {
  const land = LANDS[currentLand];
  const f = document.createElement("div");
  f.className = "fairy";
  f.textContent = land.fairy;
  f.style.left = (Math.random() * window.innerWidth) + "px";
  f.style.top  = (Math.random() * window.innerHeight) + "px";
  f.style.textShadow = "0 0 10px " + land.glow;
  game.appendChild(f);
  setTimeout(() => f.remove(), 6000); // matches the animation length
}

// ---- Getting dizzy ----
// Put spinning stars around the dragon's head and freeze it for a moment.
function makeDizzy() {
  if (dizzy) return;          // already dizzy — don't stack it
  dizzy = true;
  soundDizzy();

  const ring = document.createElement("div");
  ring.id = "dizzyStars";
  ring.innerHTML = "<span>💫</span><span>💫</span><span>💫</span>";
  dragon.appendChild(ring);   // attach to the dragon so it follows along
  dragonBody.classList.add("dizzy");
  heardEl.textContent = "😵 Dizzy! Wait for the stars to stop…";

  // After 3 seconds the dizziness wears off and everything works again.
  setTimeout(() => {
    ring.remove();
    dragonBody.classList.remove("dizzy");
    dizzy = false;
    heardEl.textContent = "✨ All better! Say a command…";
  }, 3000);
}

// ---- The spinning-star hazard ----
// A red, whirling star flies across the screen. Touch it and you get dizzy!
function spawnSpinStar() {
  const s = document.createElement("div");
  s.className = "spinStar";
  s.textContent = "🌟";
  let sx = window.innerWidth + 60;
  const sy = Math.random() * (window.innerHeight - 220) + 40;
  s.style.left = sx + "px";
  s.style.top  = sy + "px";
  game.appendChild(s);

  const move = setInterval(() => {
    sx -= 5; // faster than clouds — it's a hazard
    s.style.left = sx + "px";

    // Only check for a hit if we're not already dizzy (grace period).
    if (!dizzy) {
      const a = dragon.getBoundingClientRect();
      const b = s.getBoundingClientRect();
      const hit = !(a.right < b.left || a.left > b.right ||
                    a.bottom < b.top || a.top > b.bottom);
      if (hit) {
        makeDizzy();
        clearInterval(move);
        s.remove();
        return;
      }
    }

    if (sx < -80) { clearInterval(move); s.remove(); } // left the screen
  }, 30);
}

// ---- Sounds ----
// We MAKE the sounds right here in the browser (no sound files needed!) using
// the Web Audio API. Each effect is just a quick beep at a chosen pitch.
let audioCtx = null;

// Wake up the sound. Browsers only allow this after a real click (the Play button).
function initAudio() {
  const AC = window.AudioContext || window.webkitAudioContext;
  if (AC && !audioCtx) audioCtx = new AC();
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
}

// Play one tone: freq = pitch, dur = length, type = the "shape" of the sound.
function tone(freq, dur, type, volume) {
  if (!audioCtx) return;
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || "sine";
  osc.frequency.value = freq;
  osc.connect(gain).connect(audioCtx.destination);
  const now = audioCtx.currentTime;
  gain.gain.setValueAtTime(volume || 0.2, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + dur); // fade out smoothly
  osc.start(now);
  osc.stop(now + dur);
}

// Play several tones in a row to make a little tune.
function tune(notes) {
  let when = 0;
  for (const n of notes) {
    setTimeout(() => tone(n.f, n.d || 0.15, n.t || "triangle", n.v || 0.2), when);
    when += (n.gap || 120);
  }
}

// The sound for each thing that happens in the game.
const soundStar    = () => tone(880, 0.12, "triangle", 0.2);            // catch a star
const soundFire    = () => tone(300, 0.08, "square", 0.12);            // breathe fire
const soundPotion  = () => tune([{ f: 660 }, { f: 990 }]);             // drink a potion
const soundExplode = () => tone(110, 0.30, "sawtooth", 0.3);          // BOOM
const soundBoss    = () => tune([{ f: 523 }, { f: 659 }, { f: 784 }, { f: 1047, d: 0.3 }]); // beat a boss
const soundLand    = () => tune([{ f: 784 }, { f: 1047 }, { f: 1319, d: 0.3 }]); // reach a new land
function soundDizzy() {
  // A woozy slide from high down to low.
  if (!audioCtx) return;
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "sine";
  const now = audioCtx.currentTime;
  osc.frequency.setValueAtTime(700, now);
  osc.frequency.exponentialRampToValueAtTime(160, now + 0.6);
  gain.gain.setValueAtTime(0.25, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + 0.6);
}

// Game state — the numbers we keep track of while playing.
let score = 0;
let dragonY = window.innerHeight / 2; // up/down position (pixels from top)
let dragonX = 120;                    // left/right position
const STEP = 80;                      // how far the dragon moves per command
let dizzy = false;                    // true while the dragon is stunned by a spinning star

// ---- Moving the dragon ----
// We keep the dragon inside the window so it never flies off-screen.
function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function placeDragon() {
  dragonY = clamp(dragonY, 40, window.innerHeight - 100);
  dragonX = clamp(dragonX, 20, window.innerWidth - 120);
  dragon.style.top  = dragonY + "px";
  dragon.style.left = dragonX + "px";
}

// Flying = flapping. Landing = settle down and stop flapping.
function setFlying() { dragonBody.classList.remove("landed"); }
function land() {
  dragonBody.classList.add("landed");
  dragonY = window.innerHeight - 100; // drop down to the ground
  placeDragon();
}

// Every move makes the dragon take off (start flapping) first.
function moveUp()    { setFlying(); dragonY -= STEP; placeDragon(); }
function moveDown()  { setFlying(); dragonY += STEP; placeDragon(); }
function moveLeft()  { setFlying(); dragonX -= STEP; placeDragon(); }
function moveRight() { setFlying(); dragonX += STEP; placeDragon(); }

// ---- Breathing fire ----
// A fire emoji shoots to the right from the dragon's mouth, then disappears.
function breatheFire() {
  soundFire();
  const fire = document.createElement("div");
  fire.className = "fire";
  fire.textContent = "🔥";
  let fx = dragonX + 60;
  const fy = dragonY + 10;
  fire.style.left = fx + "px";
  fire.style.top  = fy + "px";
  game.appendChild(fire);

  // Move the fire across the screen a little at a time.
  const flight = setInterval(() => {
    fx += 18;
    fire.style.left = fx + "px";

    // Did this fire hit a boss? Check every boss on screen.
    const fr = fire.getBoundingClientRect();
    for (const boss of bosses.slice()) {
      const br = boss.el.getBoundingClientRect();
      const hit = !(fr.right < br.left || fr.left > br.right ||
                    fr.bottom < br.top || fr.top > br.bottom);
      if (hit) {
        boss.hp -= 1;          // knock down its health
        explode(fx, fy);       // little sparks where it was struck
        clearInterval(flight);
        fire.remove();
        if (boss.hp <= 0) defeatBoss(boss); // beaten!
        return;
      }
    }

    if (fx > window.innerWidth) {
      clearInterval(flight);
      fire.remove();
    }
  }, 30);
}

// A burst of explosion at a spot on the screen.
function explode(x, y) {
  soundExplode();
  const boom = document.createElement("div");
  boom.className = "boom";
  boom.textContent = "💥";
  boom.style.left = x + "px";
  boom.style.top  = y + "px";
  game.appendChild(boom);
  setTimeout(() => boom.remove(), 600);
}

// ---- Stars to catch ----
// Every couple of seconds a new star pops up somewhere random.
function spawnStar() {
  const star = document.createElement("div");
  star.className = "star";
  star.textContent = "⭐";
  star.style.left = (Math.random() * (window.innerWidth - 120) + 40) + "px";
  star.style.top  = (Math.random() * (window.innerHeight - 160) + 60) + "px";
  game.appendChild(star);

  // Check if the dragon is touching the star a few times per second.
  const check = setInterval(() => {
    const a = dragon.getBoundingClientRect();
    const b = star.getBoundingClientRect();
    const touching = !(a.right < b.left || a.left > b.right ||
                       a.bottom < b.top || a.top > b.bottom);
    if (touching) {
      soundStar();
      addScore(1);
      star.remove();
      clearInterval(check);
    }
  }, 150);

  // If nobody catches it, the star fades away after a while.
  setTimeout(() => { star.remove(); clearInterval(check); }, 7000);
}

// A few decorative clouds drifting in the background.
function spawnCloud() {
  const cloud = document.createElement("div");
  cloud.className = "cloud";
  cloud.textContent = "☁️";
  let cx = window.innerWidth + 60;
  cloud.style.top = (Math.random() * window.innerHeight * 0.6) + "px";
  cloud.style.left = cx + "px";
  game.appendChild(cloud);
  const drift = setInterval(() => {
    cx -= 2;
    cloud.style.left = cx + "px";
    if (cx < -80) { clearInterval(drift); cloud.remove(); }
  }, 40);
}

// ---- Potions (worth 5 points and they EXPLODE when eaten) ----
function spawnPotion() {
  const potion = document.createElement("div");
  potion.className = "potion";
  potion.textContent = "🧪";
  const px = Math.random() * (window.innerWidth - 120) + 40;
  const py = Math.random() * (window.innerHeight - 200) + 60;
  potion.style.left = px + "px";
  potion.style.top  = py + "px";
  game.appendChild(potion);

  // Keep checking if the dragon has reached the potion.
  const check = setInterval(() => {
    const a = dragon.getBoundingClientRect();
    const b = potion.getBoundingClientRect();
    const touching = !(a.right < b.left || a.left > b.right ||
                       a.bottom < b.top || a.top > b.bottom);
    if (touching) {
      soundPotion();
      addScore(5);                // potions are worth 5!
      explode(b.left, b.top);     // BOOM when eaten
      potion.remove();
      clearInterval(check);
    }
  }, 150);

  // If nobody drinks it, it fades away.
  setTimeout(() => { potion.remove(); clearInterval(check); }, 8000);
}

// ---- Bosses (worth 20 points — fire at them to beat them!) ----
function spawnBoss() {
  const el = document.createElement("div");
  el.className = "boss";
  el.textContent = "🐲";
  let bx = window.innerWidth + 80;
  const by = Math.random() * (window.innerHeight * 0.5) + 60;
  el.style.left = bx + "px";
  el.style.top  = by + "px";
  game.appendChild(el);

  const boss = { el, hp: 3 };   // takes 3 fire hits to beat
  bosses.push(boss);

  // The boss drifts slowly across the sky.
  boss.move = setInterval(() => {
    bx -= 1.4;
    el.style.left = bx + "px";
    if (bx < -120) removeBoss(boss); // left the screen, give up the chase
  }, 30);
}

function removeBoss(boss) {
  clearInterval(boss.move);
  boss.el.remove();
  const i = bosses.indexOf(boss);
  if (i >= 0) bosses.splice(i, 1);
}

function defeatBoss(boss) {
  const br = boss.el.getBoundingClientRect();
  explode(br.left, br.top);        // a big double explosion
  explode(br.left + 36, br.top + 24);
  soundBoss();
  addScore(20);                    // bosses are worth lots!
  removeBoss(boss);
}

// ---- Turning words into actions ----
// This is the heart of the voice control. We get a sentence of text,
// make it lowercase, and look for command words inside it.
function handleCommand(text) {
  if (dizzy) return; // frozen! the dragon can't hear commands while dizzy
  const said = text.toLowerCase();
  heardEl.textContent = "🗣️ " + text;

  if (said.includes("up"))           moveUp();
  if (said.includes("down"))         moveDown();
  if (said.includes("left"))         moveLeft();
  if (said.includes("right"))        moveRight();
  if (said.includes("fire") ||
      said.includes("burn")  ||
      said.includes("flame")) breatheFire();
  if (said.includes("go") || said.includes("fly")) moveRight();
  if (said.includes("land")) land();           // come down and rest
  if (said.includes("stop")) { /* just hover in place */ }
}

// ---- The voice (speech recognition) ----
// Not every browser has this. Chrome does. We check first so the game
// still loads (just without voice) on browsers that don't support it.
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let wantListening = false;

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.continuous = true;     // keep listening, don't stop after one phrase
  recognition.interimResults = true; // show words as they're being recognized
  recognition.lang = "en-US";

  recognition.onstart = () => {
    micDot.classList.add("listening");
    micLabel.textContent = "Listening…";
  };

  recognition.onresult = (event) => {
    // Look at the newest chunk of speech and act on it.
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const phrase = event.results[i][0].transcript.trim();
      if (phrase) handleCommand(phrase);
    }
  };

  // Browsers sometimes stop listening on their own — restart if we still want it.
  recognition.onend = () => {
    micDot.classList.remove("listening");
    micLabel.textContent = "Mic off";
    if (wantListening) {
      try { recognition.start(); } catch (e) { /* already starting */ }
    }
  };

  recognition.onerror = (e) => {
    heardEl.textContent = "Mic error: " + e.error + " (allow microphone access)";
  };
} else {
  heardEl.textContent = "This browser has no voice support — try Google Chrome.";
}

// ---- Starting the game ----
// Browsers only allow the microphone to start after a real click,
// so the game begins when you press the Play button.
startBtn.addEventListener("click", () => {
  startBtn.style.display = "none";
  initAudio(); // wake up the sound now that the player has clicked
  placeDragon();

  if (recognition) {
    wantListening = true;
    try { recognition.start(); } catch (e) { /* already running */ }
  }

  // Start the world: stars, potions, clouds, and bosses keep appearing.
  setInterval(spawnStar, 2200);
  setInterval(spawnPotion, 4500);
  setInterval(spawnCloud, 3000);
  setInterval(spawnBoss, 10000);
  setInterval(spawnSpinStar, 5000); // the dizzy hazard
  spawnStar();
  spawnPotion();

  // Set up the first land's scenery and start the twinkling fairies.
  sceneryRow.textContent = LANDS[0].scenery;
  setInterval(spawnFairy, 350);
});

// Keyboard backup so you can also play with arrow keys + space bar.
document.addEventListener("keydown", (e) => {
  if (dizzy) return; // frozen! the keys do nothing while dizzy
  if (e.key === "ArrowUp")    moveUp();
  if (e.key === "ArrowDown")  moveDown();
  if (e.key === "ArrowLeft")  moveLeft();
  if (e.key === "ArrowRight") moveRight();
  if (e.key === " ")          breatheFire();
});

// Keep the dragon on screen if the window is resized.
window.addEventListener("resize", placeDragon);
placeDragon();
</script>
