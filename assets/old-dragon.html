<!--
  SAVED: the old hand-drawn SVG dragon (Clara), in case you want it back.
  To restore: replace the contents of <div id="dragonBody"> in index.html with
  this <svg>, set #dragonFlip transform to none, and remove the font-size/
  hue-rotate from #dragonBody (give #dragonBody svg a width instead).
  See git commit "Sleeker, more dragon-like silhouette" for the exact CSS.
-->
<svg viewBox="0 0 150 130" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="dBody" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#ffb0e0"/><stop offset="1" stop-color="#ef6cbf"/>
          </linearGradient>
          <linearGradient id="dBelly" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#fff3e4"/><stop offset="1" stop-color="#ffe0c8"/>
          </linearGradient>
          <linearGradient id="dWing" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#ffa6da"/><stop offset="1" stop-color="#ff6fc2"/>
          </linearGradient>
          <linearGradient id="dGold" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#ffe9a8"/><stop offset="1" stop-color="#f0b43e"/>
          </linearGradient>
          <radialGradient id="dGem" cx="0.4" cy="0.3" r="0.8">
            <stop offset="0" stop-color="#ffe0f3"/><stop offset="0.5" stop-color="#ff7fc4"/><stop offset="1" stop-color="#e63faa"/>
          </radialGradient>
          <radialGradient id="dEye" cx="0.4" cy="0.35" r="0.8">
            <stop offset="0" stop-color="#d7b6ff"/><stop offset="0.6" stop-color="#9a5fe0"/><stop offset="1" stop-color="#5a2fb0"/>
          </radialGradient>
        </defs>
        <!-- far wing (behind) -->
        <path d="M72 60 C60 40 46 34 38 40 C48 44 56 52 62 64 Z" fill="url(#dWing)" opacity="0.5"/>
        <!-- tail (long, serpentine, tapering) -->
        <path d="M48 88 C34 96 24 102 16 112 C12 116 13 119 16 119 C18 115 21 112 27 107 C37 100 44 94 50 86 Z" fill="url(#dBody)"/>
        <path d="M40 92 l3 -5 l3 5 Z" fill="#ff7fc4"/>
        <path d="M29 99 l2 -4 l3 4 Z" fill="#ff7fc4"/>
        <path d="M17 118 C10 115 7 122 12 127 C17 125 20 121 17 118 Z" fill="#ff4fae"/>
        <path d="M14 120 q3 3 4 6" stroke="#c0357f" stroke-width="0.8" fill="none"/>
        <!-- hind leg (slim) -->
        <path d="M60 88 C57 97 58 106 63 110 C68 108 67 98 65 89 Z" fill="url(#dBody)"/>
        <path d="M57 108 q7 4 14 0 q-2 5 -7 5 q-5 0 -7 -5 Z" fill="#ef6cbf"/>
        <path d="M59 112 l1.5 4 M64 113 l0 4 M69 112 l-1.5 4" stroke="#fff0d8" stroke-width="1.3" stroke-linecap="round"/>
        <!-- body (lean, athletic) -->
        <path d="M40 86 C42 73 58 67 80 69 C98 71 104 80 100 88 C95 97 78 100 60 98 C49 97 40 93 40 86 Z" fill="url(#dBody)"/>
        <!-- underbelly + chest plates -->
        <path d="M58 91 C68 99 86 99 95 90 C90 97 74 100 62 96 Z" fill="url(#dBelly)" opacity="0.9"/>
        <path d="M64 91 q13 4 25 -1 M66 95 q11 4 21 0" stroke="#f3c9a8" stroke-width="1" fill="none" opacity="0.6"/>
        <!-- front leg (slim) -->
        <path d="M85 88 C83 97 85 106 90 110 C95 108 94 98 92 89 Z" fill="url(#dBody)"/>
        <path d="M82 108 q7 4 14 0 q-2 5 -7 5 q-5 0 -7 -5 Z" fill="#ef6cbf"/>
        <path d="M84 112 l1.5 4 M89 113 l0 4 M94 112 l-1.5 4" stroke="#fff0d8" stroke-width="1.3" stroke-linecap="round"/>
        <!-- dorsal ridge spikes along the back -->
        <path d="M50 70 l3 -7 l3 7 Z" fill="#ff7fc4"/>
        <path d="M58 67 l3 -7 l3 7 Z" fill="#ff7fc4"/>
        <path d="M66 66 l3 -7 l3 7 Z" fill="#ff7fc4"/>
        <path d="M74 67 l3 -6 l3 6 Z" fill="#ff7fc4"/>
        <!-- neck (long, sleek S-curve) -->
        <path d="M78 72 C82 54 94 44 110 46 C104 54 99 64 95 74 C89 72 83 72 78 72 Z" fill="url(#dBody)"/>
        <!-- mane / frill (tall, sharp, fierce) -->
        <path d="M75 58 l3 -16 l7 12 Z" fill="#ff3fa6"/>
        <path d="M84 51 l3 -18 l7 13 Z" fill="#ff2f9e"/>
        <path d="M94 45 l3 -18 l7 13 Z" fill="#e0349a"/>
        <path d="M103 41 l2 -14 l6 11 Z" fill="#cf2f92"/>
        <!-- head + muzzle -->
        <path d="M104 46 C104 33 116 28 125 32 C133 36 135 45 132 52 C129 60 120 63 112 60 C107 58 104 53 104 46 Z" fill="url(#dBody)"/>
        <path d="M126 43 C141 41 149 47 149 51 C149 56 141 58 132 56 C129 55 126 50 126 47 Z" fill="url(#dBody)"/>
        <circle cx="145" cy="49" r="1.3" fill="#b4568f"/>
        <!-- confident smirk + a little fang -->
        <path d="M131 54 q7 3 13 0" stroke="#b0507f" stroke-width="1.4" fill="none" stroke-linecap="round"/>
        <path d="M137 54.5 l1.4 3 l1.4 -3 Z" fill="#ffffff"/>
        <!-- long majestic horns -->
        <path d="M110 32 C104 13 95 5 83 3 C92 11 100 21 104 34 Z" fill="url(#dGold)"/>
        <path d="M119 30 C116 12 109 5 99 2 C107 11 114 19 116 32 Z" fill="url(#dGold)"/>
        <path d="M107 30 C103 20 99 14 92 11" stroke="#e2a23a" stroke-width="0.8" fill="none" opacity="0.55"/>
        <!-- ear frill -->
        <path d="M108 38 l-7 -12 l11 4 Z" fill="#ff7fc4"/>
        <!-- subtle cheek blush -->
        <circle cx="127" cy="54" r="3" fill="#ff9ec9" opacity="0.4"/>
        <!-- fierce almond eye + determined brow -->
        <path d="M113 45 Q120 39 128 44 Q121 49.5 113 45 Z" fill="#ffffff"/>
        <circle cx="121" cy="44.6" r="4.2" fill="url(#dEye)"/>
        <circle cx="121" cy="44.6" r="2" fill="#180b30"/>
        <circle cx="119.4" cy="42.9" r="1.3" fill="#ffffff"/>
        <path d="M112 39 Q120 34.5 129 39.5" stroke="#d23f8e" stroke-width="2.3" fill="none" stroke-linecap="round"/>
        <path d="M113 43.5 q-3 -1 -5 0" stroke="#3a2a5a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- jewelled tiara -->
        <path d="M108 36 Q116 28 125 34" fill="none" stroke="url(#dGold)" stroke-width="3" stroke-linecap="round"/>
        <path d="M116 27 l3 5 l-3 4 l-3 -4 Z" fill="url(#dGem)" stroke="#fff" stroke-width="0.7"/>
        <circle cx="109" cy="35" r="1.5" fill="#ff7fc4" stroke="#fff" stroke-width="0.4"/>
        <circle cx="124" cy="35" r="1.5" fill="#ff7fc4" stroke="#fff" stroke-width="0.4"/>
        <!-- heart chest gem -->
        <path d="M89 70 c-2 -3 -8 -2 -8 3 c0 5 8 8 8 10 c0 -2 8 -5 8 -10 c0 -5 -6 -6 -8 -3 Z" fill="url(#dGem)" stroke="url(#dGold)" stroke-width="1.4"/>
        <circle cx="86" cy="74" r="1.3" fill="#fff" opacity="0.8"/>
        <!-- main wing (front, raised, gold edge) -->
        <path d="M76 60 C70 34 58 18 42 14 C48 24 52 34 52 44 C44 36 36 32 28 32 C36 41 44 50 50 58 C44 56 38 56 34 60 C46 63 64 64 76 60 Z" fill="url(#dWing)" stroke="#f0b43e" stroke-width="1.4"/>
        <path d="M76 60 C70 34 58 18 42 14" fill="none" stroke="url(#dGold)" stroke-width="3" stroke-linecap="round"/>
        <path d="M70 58 C62 46 54 38 46 34 M64 60 C58 50 50 46 44 44" fill="none" stroke="#e85bb0" stroke-width="1" opacity="0.55"/>
        <path d="M74 56 c-1.6 -2.4 -6 -1.6 -6 2 c0 3.6 6 6 6 7.6 c0 -1.6 6 -4 6 -7.6 c0 -3.6 -4.4 -4.4 -6 -2 Z" fill="#ff7fc4" opacity="0.9"/>
        <!-- sparkles -->
        <g fill="#ffffff">
          <path d="M140 22 l1.5 3.5 l3.5 1.5 l-3.5 1.5 l-1.5 3.5 l-1.5 -3.5 l-3.5 -1.5 l3.5 -1.5 Z"/>
          <path d="M24 24 l1.2 3 l3 1.2 l-3 1.2 l-1.2 3 l-1.2 -3 l-3 -1.2 l3 -1.2 Z"/>
          <path d="M98 18 l1 2.5 l2.5 1 l-2.5 1 l-1 2.5 l-1 -2.5 l-2.5 -1 l2.5 -1 Z"/>
        </g>
      </svg>
